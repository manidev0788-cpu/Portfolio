<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" fill="none" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="faq-ai-glow" x1="120" y1="80" x2="720" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7cf7d4" stop-opacity="0.35"/>
      <stop offset="0.45" stop-color="#9ef0a8" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#d9ff63" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="faq-ai-core" x1="400" y1="220" x2="400" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7cf7d4"/>
      <stop offset="1" stop-color="#d9ff63"/>
    </linearGradient>
    <filter id="faq-ai-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="faq-ai-chip" x1="330" y1="250" x2="470" y2="312" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7cf7d4" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#d9ff63" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Base panel -->
  <rect width="800" height="500" rx="32" fill="#081a1b"/>
  <rect width="800" height="500" rx="32" fill="url(#faq-ai-glow)" opacity="0.9"/>

  <!-- Subtle grid -->
  <g opacity="0.14" stroke="#7cf7d4" stroke-width="0.6">
    <path d="M60 420h680M140 80v340M340 80v340M540 80v340M740 140v260"/>
    <path d="M60 300h680M80 140h640M80 200h640M80 360h640"/>
  </g>

  <!-- Outer orbit arcs -->
  <ellipse cx="400" cy="272" rx="220" ry="118" stroke="url(#faq-ai-core)" stroke-opacity="0.25" stroke-width="1"/>
  <ellipse cx="400" cy="272" rx="170" ry="88" stroke="#7cf7d4" stroke-opacity="0.18" stroke-width="0.8"/>

  <!-- Connection lines -->
  <g stroke="#7cf7d4" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round">
    <path d="M180 295 L298 278"/>
    <path d="M502 278 L620 295"/>
    <path d="M400 128 L378 238"/>
    <path d="M400 128 L422 238"/>
    <path d="M248 392 L362 352"/>
    <path d="M552 392 L438 352"/>
    <path filter="url(#faq-ai-soft)" d="M400 248 L400 318"/>
  </g>

  <!-- Glow nodes -->
  <circle cx="180" cy="295" r="6" fill="#7cf7d4" opacity="0.85"/>
  <circle cx="620" cy="295" r="6" fill="#d9ff63" opacity="0.85"/>
  <circle cx="400" cy="128" r="5" fill="#7cf7d4" opacity="0.7"/>
  <circle cx="248" cy="392" r="5" fill="#d9ff63" opacity="0.55"/>
  <circle cx="552" cy="392" r="5" fill="#7cf7d4" opacity="0.55"/>

  <!-- Central AI chip -->
  <rect x="310" y="228" width="180" height="104" rx="16" stroke="url(#faq-ai-core)" stroke-opacity="0.45" stroke-width="1.2" fill="url(#faq-ai-chip)"/>
  <rect x="330" y="248" width="140" height="64" rx="10" stroke="#7cf7d4" stroke-opacity="0.25" stroke-width="0.8" fill="#071f1fa8"/>
  <path d="M352 278h28l8 10h24l8-10h28" stroke="url(#faq-ai-core)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small circuit ticks -->
  <g stroke="#7cf7d4" stroke-opacity="0.4" stroke-width="1">
    <path d="M310 250h-28M492 248h26M392 332v28M392 216v28"/>
    <path d="M326 344h148M492 344h38M270 344h36"/>
  </g>

  <!-- Spark / AI sparkle -->
  <path
    fill="#d9ff63"
    fill-opacity="0.92"
    d="M596 154l8 26 26 8-26 10-8 26-10-26-26-8 26-10Zm-446 68l6 18 18 6-18 8-6 18-6-18-18-6 18-8Z"/>

  <!-- Bottom hint bar (decorative only) -->
  <rect x="200" y="408" width="400" height="36" rx="18" fill="#00000042" stroke="#ffffff14"/>
</svg>
